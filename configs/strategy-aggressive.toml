# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 策略C: 激进型 (Aggressive)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 适用场景:
#   - 资金 $5,000+，有做市经验，理解逆向选择风险
#   - 短周期高活跃市场 (周内事件、体育赛事、快速结算)
#   - 概率 30%-70% 的高流动性市场
#
# 特点:
#   - 窄价差 (0.5 cent base)，最大化 Q-Score 效率
#   - 资金高度集中内层 → 二次方衰减下效率最大化
#   - 宽松风控阈值，容忍较大持仓偏移
#   - 多市场覆盖 (3-5 个市场)
#   - 预期年化: 20%-40% (含流动性奖励)
#
# ⚠️ 警告:
#   - 窄价差 = 高逆向选择风险 (信息不对称时亏损更快)
#   - 需要稳定网络连接 (WS 断连时暴露更大)
#   - 建议先用保守型运行 1-2 周后再切换
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── 市场配置 ──
# 3-5 个市场，最大化奖励覆盖面
# 选择标准:
#   1. 日奖励池 / 合格流动性 > 0.0001 (高激励密度)
#   2. 日交易量 > $100K (充足流动性)
#   3. 概率在 30%-70% (双边报价均有效)
#   4. 距结算 > 7 天 (避免 TF 时间因子过高)

[[markets]]
market_id = "REPLACE_WITH_MARKET_ID_1"
token_id  = "REPLACE_WITH_TOKEN_ID_1"
name      = "High Volume Market A"
max_incentive_spread = 0.03
min_size  = 20                 # $20 每单 (最大化 Q-Score)

[[markets]]
market_id = "REPLACE_WITH_MARKET_ID_2"
token_id  = "REPLACE_WITH_TOKEN_ID_2"
name      = "High Volume Market B"
max_incentive_spread = 0.03
min_size  = 20

[[markets]]
market_id = "REPLACE_WITH_MARKET_ID_3"
token_id  = "REPLACE_WITH_TOKEN_ID_3"
name      = "High Volume Market C"
max_incentive_spread = 0.03
min_size  = 15

# 可选第 4-5 个市场
# [[markets]]
# market_id = "REPLACE_WITH_MARKET_ID_4"
# token_id  = "REPLACE_WITH_TOKEN_ID_4"
